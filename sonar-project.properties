sonar.projectKey=ernsoylu_Smuggler
sonar.projectName=Smuggler
sonar.organization=ernsoylu
sonar.projectVersion=1.0

# Source directories
sonar.sources=api,cli,web/src
sonar.tests=tests

# Python
sonar.python.version=3.12
sonar.python.coverage.reportPaths=coverage.xml

# TypeScript / JavaScript
sonar.javascript.lcov.reportPaths=web/coverage/lcov.info

# Exclusions
sonar.exclusions=**/node_modules/**,**/dist/**,**/__pycache__/**,**/*.pyc,web/src/vite-env.d.ts

# Encoding
sonar.sourceEncoding=UTF-8

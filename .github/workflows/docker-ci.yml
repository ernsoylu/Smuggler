name: Docker CI

on:
  push:
    branches: [main, master]
    paths:
      - "docker/**"
      - "worker_image/**"
      - "worker_image_ovpn/**"
      - ".github/workflows/docker-ci.yml"
  pull_request:
    branches: [main, master]
    paths:
      - "docker/**"
      - "worker_image/**"
      - "worker_image_ovpn/**"
      - ".github/workflows/docker-ci.yml"

jobs:
  validate:
    name: Build Check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.api
          push: false

      - name: Build Web image (dry-run)
        uses: docker/build-push-action@v5
        with:
          context: .
          file: docker/Dockerfile.web
          push: false

      - name: Build Mule image (WireGuard)
        uses: docker/build-push-action@v5
        with:
          context: worker_image/
          file: worker_image/Dockerfile
          push: false

      - name: Build Mule image (OpenVPN)
        uses: docker/build-push-action@v5
        with:
          context: worker_image_ovpn/
          file: worker_image_ovpn/Dockerfile
          push: false

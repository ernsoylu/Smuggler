server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;

    # Serve static files directly
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Proxy /api requests to the smuggler-api (resolved via /etc/hosts extra_hosts)
    location /api/ {
        proxy_pass http://smuggler-api:5050;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

        # Support file uploads
        client_max_body_size 50M;

        # Disable buffering for streaming responses
        proxy_buffering off;
        proxy_cache off;
        chunked_transfer_encoding on;

        # Increase timeouts for long-running deploy operations (VPN handshake can take ~90s).
        # Keep these in sync with gunicorn --timeout in docker/Dockerfile.api.
        proxy_connect_timeout 180s;
        proxy_read_timeout 180s;
        proxy_send_timeout 180s;
    }
}
